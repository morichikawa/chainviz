# C層（トランザクション）の用語データ。
# スキーマは docs/ARCHITECTURE.md §5 を参照。
# 1エントリ = 用語キー -> { name, definition, layer, relatedTerms }
# name / definition は {ja, en} 形式の多言語テキスト。

transaction:
  name:
    ja: トランザクション（tx）
    en: Transaction (tx)
  definition:
    ja: >-
      アカウントが署名して送り出す、チェーンの状態を変える1件の指示。送金や
      コントラクト呼び出しがこれにあたる。まず mempool で待機し、ブロックに
      取り込まれて初めて確定する。chainviz ではウォレットカード上で pending
      から included へ変わる様子をアニメーションで示す。
    en: >-
      A single signed instruction from an account that changes chain state, such
      as a transfer or a contract call. It first waits in the mempool and is only
      final once included in a block. chainviz animates the change from pending to
      included on the wallet card.
  layer: c-transaction
  relatedTerms: [mempool, nonce, gas, eoa]

mempool:
  name:
    ja: mempool（メモリプール）
    en: Mempool
  definition:
    ja: >-
      各ノードが保持する、まだブロックに取り込まれていないトランザクションの
      待機列。送信された tx はここに入り、提案者がブロックを作るときに拾われて
      取り込まれる。取り込まれるまでの「保留中」の状態がここに滞留する。
    en: >-
      A per-node waiting area for transactions that have not yet been included in a
      block. A submitted tx lands here and is picked up when a proposer builds a
      block. The "pending" state lingers here until inclusion.
  layer: c-transaction
  relatedTerms: [transaction, gas, txpool]

nonce:
  name:
    ja: nonce（ノンス）
    en: Nonce
  definition:
    ja: >-
      1つの EOA が送ったトランザクションの通し番号（0 から始まる連番）。
      同じ nonce の二重使用や順序の飛びを防ぎ、tx の実行順を一意に定める。
      tx が1件確定するたびに、その送信元アカウントの nonce は1つ増える。
    en: >-
      A per-EOA sequence number for the transactions it has sent (a counter
      starting at 0). It prevents reuse of the same nonce and out-of-order gaps,
      fixing a unique execution order. The sender's nonce increases by one each
      time one of its transactions is finalized.
  layer: c-transaction
  relatedTerms: [transaction, eoa]

eoa:
  name:
    ja: EOA（外部所有アカウント）
    en: EOA (Externally Owned Account)
  definition:
    ja: >-
      秘密鍵によって管理される通常のアカウント。コードを持たず、鍵で署名する
      ことでトランザクションを発行できる。人やワークベンチが直接操作する
      アドレスはこれにあたる。コードを持つスマートアカウントと対になる概念。
    en: >-
      An ordinary account controlled by a private key. It holds no code and can
      issue transactions by signing with the key. Addresses that people or
      workbenches operate directly are EOAs. It is the counterpart to a smart
      account, which holds code.
  layer: c-transaction
  relatedTerms: [smart-account, nonce, wei]

smart-account:
  name:
    ja: スマートアカウント
    en: Smart account
  definition:
    ja: >-
      コード（コントラクト）を持つアカウント。EOA と違い独自の検証・実行ロジックを
      持てるため、複数署名やガス代の肩代わりといった柔軟な操作ができる。
      ERC-4337（アカウントアブストラクション）で使われる。
    en: >-
      An account that holds code (a contract). Unlike an EOA it can carry its own
      verification and execution logic, enabling flexible operations such as
      multi-signature or paying gas on someone's behalf. It is used by ERC-4337
      (account abstraction).
  layer: c-transaction
  relatedTerms: [eoa]

wei:
  name:
    ja: wei（ウェイ）
    en: Wei
  definition:
    ja: >-
      Ether の最小単位。1 Ether = 10^18 wei。残高や送金額・ガス代は内部的には
      すべて整数の wei で扱われ、小数の誤差なく計算できる。chainviz は残高を
      wei と Ether の両方で表示する。
    en: >-
      The smallest unit of Ether. 1 Ether = 10^18 wei. Balances, transfer amounts,
      and gas costs are all handled internally as integer wei so they compute
      without rounding error. chainviz shows balances in both wei and Ether.
  layer: c-transaction
  relatedTerms: [gas, eoa]

gas:
  name:
    ja: ガス
    en: Gas
  definition:
    ja: >-
      トランザクションの実行に必要な計算量を測る単位。送信者は gas 使用量に
      応じた手数料を wei で支払う。手数料の高い tx ほど mempool から優先して
      ブロックに取り込まれやすい。
    en: >-
      A unit that measures the amount of computation a transaction needs. The
      sender pays a fee in wei proportional to gas used. Transactions offering
      higher fees tend to be picked from the mempool into a block sooner.
  layer: c-transaction
  relatedTerms: [transaction, mempool, wei]

contract:
  name:
    ja: スマートコントラクト
    en: Smart contract
  definition:
    ja: >-
      チェーンに配置され、EVM 上で全ノードが同じように実行するプログラム。EOA と
      違いコードを持ち、呼び出されるとそのロジックを実行して状態を変える。
      特定のサーバーではなく全ノードが同じ実行をすることで、特定の誰かを
      信頼せずに支払い条件やトークンの台帳のようなルールを自動執行できる。
      それが仲介者なしの約束事を可能にする理由。chainviz ではコントラクト
      カードの種別ラベルとして表示され、「全ノードで実行」ピルとセットで見える。
    en: >-
      A program placed on the chain and executed identically by the EVM on
      every node. Unlike an EOA it holds code, and calling it runs that logic and
      changes state. Because every node runs the same execution instead of a
      single server, rules such as payment conditions or a token ledger can be
      enforced automatically without trusting any one party — the reason
      contracts make intermediary-free agreements possible. chainviz shows it
      as the type label on the contract card, alongside the "runs on every
      node" pill.
  layer: c-transaction
  relatedTerms: [evm, deploy, abi, token]

deploy:
  name:
    ja: デプロイ
    en: Deploy
  definition:
    ja: >-
      コントラクトのコードをチェーン上に配置するトランザクション。実行すると
      新しいアドレスが割り当てられ、以後は誰でもそのアドレスへ tx を送って
      呼び出せるようになる。開発時には Foundry や Hardhat といったツールで
      コンパイルしたコードをこの形で送り出す。chainviz では操作パネルの
      「デプロイ」タブから実行でき、確定するとコントラクト行に新しいカードが
      現れる。デプロイした人のアドレスはポップオーバーとデプロイエッジの
      ラベルにも使われる。
    en: >-
      A transaction that places a contract's compiled code on the chain. Once
      it is included, a new address is assigned and anyone can call it by
      sending a tx to that address afterward. Developers typically compile
      the code with a tool such as Foundry or Hardhat before sending it this
      way. chainviz lets you run this from the "Deploy" tab of the operation
      panel; once the tx is included, a new card appears in the contract row.
      The deployer's address also labels the popover and the deploy edge.
  layer: c-transaction
  relatedTerms: [contract, transaction, eoa]

abi:
  name:
    ja: ABI（アプリケーションバイナリインターフェース）
    en: ABI (Application Binary Interface)
  definition:
    ja: >-
      チェーン上に記録されているのは生のバイト列だけで、関数名や引数名は
      載っていない。ABI はコントラクトの呼び出し口の形を定義したもので、
      そのバイト列と人が読める名前を橋渡しする。chainviz はカタログに
      載っているコントラクトの ABI を使って関数呼び出しやイベントを人が
      読める形に復号している。カタログに無いコントラクトは「未知の
      コントラクト」として区別され、復号できない生の識別子だけが表示される。
    en: >-
      Only raw bytes are recorded on the chain — function and argument names
      are not. The ABI defines the shape of a contract's call interface,
      bridging those bytes and human-readable names. chainviz decodes
      function calls and events using the ABI of cataloged contracts. A
      contract that is not in the catalog is shown as "unknown", with only
      its raw, undecoded identifiers displayed.
  layer: c-transaction
  relatedTerms: [contract, event-log]

event-log:
  name:
    ja: イベントログ
    en: Event log
  definition:
    ja: >-
      コントラクトが実行中にチェーン上へ書き残す記録。状態を1つずつ読みに
      行くより安価に「何が起きたか」を外部へ知らせる仕組みで、アプリが
      チェーンの変化を追う主要な手段になっている。chainviz ではコントラクト
      カードの「直近の呼び出し・イベント」チップとして表示され、ABI で復号
      できればイベント名と引数が、できなければ生の識別子が出る。
    en: >-
      A record a contract writes to the chain while it executes. It is a
      cheaper way to announce "what happened" than reading state field by
      field, and it is the main way applications track changes on the chain.
      chainviz shows these as chips under "Recent calls & events" on the
      contract card, with a decoded event name and arguments when the ABI is
      known, or a raw identifier when it is not.
  layer: c-transaction
  relatedTerms: [contract, abi]

evm:
  name:
    ja: EVM（Ethereum Virtual Machine）
    en: EVM (Ethereum Virtual Machine)
  definition:
    ja: >-
      全ノードが搭載する、同一の仕様で動く仮想計算機。コントラクトのコードは
      ここで実行される。同じ tx を同じ順序で実行すれば必ず同じ結果になる
      ことが保証されており、これが全ノードの状態が一致する（＝コントラクトが
      どこか1か所のサーバーで動いているのではない）ことの根拠になる。
      chainviz ではコントラクトカードの「全ノードで実行」ピルがこの事実を表す。
    en: >-
      The virtual machine every node runs, built to the same specification,
      where a contract's code executes. Running the same tx in the same
      order is guaranteed to produce the same result, which is why every
      node's state ends up identical — a contract does not run on any single
      server. chainviz represents this with the "runs on every node" pill on
      the contract card.
  layer: c-transaction
  relatedTerms: [contract]

token:
  name:
    ja: トークン
    en: Token
  definition:
    ja: >-
      コントラクトが管理する残高の台帳。ETH のようなプロトコル本体の通貨とは
      違い、コントラクト内部の帳簿として各アドレスの残高を記録する。ERC20
      という共通の呼び出し口のおかげで、どのウォレット・アプリからも同じ
      方法で残高照会や送金ができる。chainviz ではウォレットカードのトークン
      残高チップと、コントラクトカードのサブタイトル（シンボル表示）に使われる。
    en: >-
      A ledger of balances that a contract manages. Unlike ETH, the network's
      native currency, it records each address's balance as an internal
      bookkeeping entry inside the contract. Thanks to the common ERC20
      interface, any wallet or app can query balances or transfer tokens the
      same way. chainviz uses it for the token balance chips on the wallet
      card and the symbol shown in the contract card's subtitle.
  layer: c-transaction
  relatedTerms: [contract, transaction]
