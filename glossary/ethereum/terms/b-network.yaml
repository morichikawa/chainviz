# B層（P2P ネットワーク）の用語データ。
# スキーマは docs/ARCHITECTURE.md §5 を参照。
# 1エントリ = 用語キー -> { name, definition, layer, relatedTerms }
# name / definition は {ja, en} 形式の多言語テキスト。

p2p:
  name:
    ja: P2P ネットワーク
    en: P2P network
  definition:
    ja: >-
      ノード同士が中央のサーバーを介さず直接つながり合って構成する
      ネットワーク。ブロックやトランザクションはこの網の目を伝わって
      チェーン全体へ広がる。chainviz ではノードカードの間の紐として描く。
    en: >-
      A network in which nodes connect directly to one another without a central
      server. Blocks and transactions spread across the whole chain through this
      mesh. chainviz draws it as cords between node cards.
  layer: b-network
  relatedTerms: [peer, discovery, gossip]

peer:
  name:
    ja: ピア
    en: Peer
  definition:
    ja: >-
      あるノードが P2P で直接接続している相手ノードのこと。各ノードは
      複数のピアを保ち、受け取ったブロックやトランザクションをピアへ
      転送し合うことでチェーンの状態を共有する。
    en: >-
      A counterpart node that a given node is directly connected to over P2P.
      Each node keeps several peers and relays the blocks and transactions it
      receives to them, sharing the chain's state.
  layer: b-network
  relatedTerms: [p2p, discovery, gossip]

discovery:
  name:
    ja: ノード発見
    en: Node discovery
  definition:
    ja: >-
      新しく参加したノードが接続先のピアを見つける仕組み。Ethereum では
      discv5 という分散型の探索プロトコルを使い、既知のノードから
      少しずつ他のノードの情報を集めて接続を広げていく。
    en: >-
      The mechanism by which a newly joined node finds peers to connect to.
      Ethereum uses discv5, a distributed discovery protocol, gathering
      information about other nodes from known ones to grow its connections.
  layer: b-network
  relatedTerms: [peer, p2p, bootnode]

bootnode:
  name:
    ja: ブートノード
    en: Bootnode
  definition:
    ja: >-
      新しく参加するノードが最初に接続する入口役のノード。既知の接続先
      としてここから他のピアの情報を教わり、以後は各ノードがノード発見で
      自分の接続を広げていく(2本目以降の接続はブートノードを介さない)。
      chainviz の Ethereum プロファイルでは reth1(実行)と beacon1
      (コンセンサス)がこの役を担う。
    en: >-
      The entry-point node that a newly joining node connects to first. It
      learns about other peers through this known node, and from then on
      each node grows its own connections via discovery (connections beyond
      the first no longer go through the bootnode). In chainviz's Ethereum
      profile, reth1 (execution) and beacon1 (consensus) play this role.
  layer: b-network
  relatedTerms: [peer, discovery, p2p]

execution-p2p:
  name:
    ja: 実行層P2Pネットワーク
    en: Execution P2P network
  definition:
    ja: >-
      実行クライアント(reth など)同士が devp2p というプロトコルで
      直接つながるP2Pネットワーク。トランザクションのゴシップや過去
      ブロックの取り寄せ(同期)に使われる。
    en: >-
      The P2P network in which execution clients (such as reth) connect
      directly to one another using the devp2p protocol. It is used for
      gossiping transactions and fetching past blocks (syncing).
  layer: b-network
  relatedTerms: [p2p, peer, gossip]

consensus-p2p:
  name:
    ja: 合意層P2Pネットワーク
    en: Consensus P2P network
  definition:
    ja: >-
      コンセンサスクライアント(beacon)同士が libp2p でつながる
      P2Pネットワーク。新しいブロックや合意情報のゴシップに使われる。
    en: >-
      The P2P network in which consensus clients (beacon nodes) connect to
      one another over libp2p. It is used for gossiping new blocks and
      consensus information.
  layer: b-network
  relatedTerms: [p2p, peer, gossip]

gossip:
  name:
    ja: ゴシップ伝播
    en: Gossip propagation
  definition:
    ja: >-
      受け取った情報を接続中のピアへ次々と転送し、網の目を伝って全体へ
      広める伝播方式。1つのノードが作ったブロックが数百ミリ秒で
      ネットワーク全体へ届くのはこの仕組みによる。
    en: >-
      A propagation style in which a node forwards information it receives to its
      connected peers, spreading it across the mesh to everyone. It is how a
      block made by one node reaches the whole network within a few hundred
      milliseconds.
  layer: b-network
  relatedTerms: [peer, p2p]
