# A層（インフラ）の用語データ。
# スキーマは docs/ARCHITECTURE.md §5 を参照。
# 1エントリ = 用語キー -> { name, definition, layer, relatedTerms }
# name / definition は {ja, en} 形式の多言語テキスト。

container:
  name:
    ja: コンテナ
    en: Container
  definition:
    ja: >-
      アプリケーションとその実行環境をまとめて隔離する軽量な実行単位。chainviz
      では各 Ethereum ノードやワークベンチが1つの Docker コンテナとして動く。
    en: >-
      A lightweight, isolated unit that packages an application together with
      its runtime. In chainviz each Ethereum node and workbench runs as one
      Docker container.
  layer: a-infra
  relatedTerms: [port-mapping, el-client, cl-client, workbench]

port-mapping:
  name:
    ja: ポートマッピング
    en: Port mapping
  definition:
    ja: >-
      コンテナ内部のポートをホスト側のポートへ結びつけ、外部から到達できる
      ようにする設定。Ethereum ノードでは JSON-RPC(8545) や P2P(30303) を公開する。
    en: >-
      A mapping that binds a port inside the container to a port on the host so
      it can be reached from outside. Ethereum nodes expose JSON-RPC (8545) and
      P2P (30303) this way.
  layer: a-infra
  relatedTerms: [container]

el-client:
  name:
    ja: 実行クライアント（EL）
    en: Execution client (EL)
  definition:
    ja: >-
      トランザクションの実行と EVM の状態遷移を担うクライアント。JSON-RPC を
      提供する。chainviz では reth を使う。
    en: >-
      The client responsible for executing transactions and applying EVM state
      transitions, and for serving JSON-RPC. chainviz uses reth.
  layer: a-infra
  relatedTerms: [cl-client, container, engine-api, el-cl-separation, staged-sync]

cl-client:
  name:
    ja: コンセンサスクライアント（CL）
    en: Consensus client (CL)
  definition:
    ja: >-
      Proof of Stake の合意形成（ブロック提案・投票）を担うクライアント。
      実行クライアントとは Engine API で連携する。chainviz では lighthouse を使う。
    en: >-
      The client that drives Proof of Stake consensus (block proposal and
      attestation) and talks to the execution client over the Engine API.
      chainviz uses lighthouse.
  layer: a-infra
  relatedTerms: [el-client, container, engine-api, el-cl-separation, beacon-api]

slot:
  name:
    ja: スロット
    en: Slot
  definition:
    ja: >-
      Proof of Stake で「ブロックを提案してよい機会」に割り当てられる時間の
      単位。Ethereum の本番ネットワーク（メインネット）では1スロット=12秒に
      固定されているが、chainviz の開発環境では起動・進行を待つ時間を
      短くするため2秒に短縮している。担当バリデーターが不在・遅延した
      場合はブロックが提案されない空スロットになる。ヘッドスロットは
      合意クライアント（CL）が今いる先頭のスロット番号で、空スロットの分
      だけ実行クライアント（EL）のブロック高より少し大きくなり得る。
      chainviz ではコンセンサスクライアントのカードで「ヘッドスロット」
      として見え、reth（EL）側の「ブロック高」と数値が完全には一致
      しなくても異常ではない。
    en: >-
      The unit of time assigned to a Proof of Stake block-proposal
      opportunity. On Ethereum mainnet a slot is fixed at 12 seconds;
      chainviz's dev environment shortens it to 2 seconds so you don't
      have to wait as long to see the chain progress. If the assigned
      validator is absent or too slow, the slot goes empty with no block
      proposed. The head slot is the slot number the consensus client
      (CL) currently sits at, and it can run slightly ahead of the
      execution client's (EL) block height by the count of empty slots.
      chainviz shows this as "Head slot" on the consensus client's card;
      a small mismatch with the reth (EL) card's "Block height" is
      expected, not a sign of trouble.
  layer: a-infra
  relatedTerms: [block, cl-client]

workbench:
  name:
    ja: ワークベンチ
    en: Workbench
  definition:
    ja: >-
      ユーザーが tx 送信・コントラクトデプロイなどの操作を行う開発用コンテナ。
      ノードと同じネットワークに接続し、1台 = 1人の登場人物として扱う。
    en: >-
      A development container from which a user sends transactions, deploys
      contracts, and runs CLI tools. It joins the same network as the nodes and
      represents one actor per container.
  layer: a-infra
  relatedTerms: [container, el-client]

validator:
  name:
    ja: バリデーター
    en: Validator
  definition:
    ja: >-
      ステーク（担保）を預けてブロックの提案・承認に参加する係。合意は
      チェーンを勝手に伸ばさないための多数決であり、バリデーターはその
      投票者にあたる。chainviz ではコンセンサスクライアントに接続された
      専用コンテナとして見え、チェーンのコピーは持たないため同期状態や
      ブロック高は表示しない。
    en: >-
      A participant that deposits stake (collateral) to take part in block
      proposal and attestation. Consensus is a vote that prevents the chain
      from being extended arbitrarily, and the validator is that voter. In
      chainviz it appears as a dedicated container connected to a consensus
      client; it does not keep its own copy of the chain, so it shows
      neither sync status nor block height.
  layer: a-infra
  relatedTerms: [cl-client, bootnode, beacon-api]

attestation:
  name:
    ja: Attestation（証明）
    en: Attestation
  definition:
    ja: >-
      バリデーターが「このブロックがいま正しいチェーンの先端だ」と署名して
      投票する証明。1人の投票では何も決まらないが、多数のバリデーターの
      attestation が集まることでチェーンの先端が1本に確定していく——これが
      PoS の合意そのものの実体。chainviz では validator カードから beacon
      カードへの接続として見えるが、投票の中身（どのブロックに投票した
      か・成否）までは観測していない（validator は自身のチェーンコピーを
      持たず、chainviz はコンセンサスクライアントの内部状態を覗いていない
      ため）。EOA の tx 署名の検証（ecrecover）を試せる「署名と検証の
      しくみ」砂場デモの末尾でも、これと対比する形で位置づけを説明する。
    en: >-
      A signed vote by a validator asserting "this block is currently the
      head of the correct chain." A single vote decides nothing, but as
      attestations from many validators accumulate, the chain's head becomes
      settled — this is the substance of PoS consensus itself. In chainviz it
      appears as the connection from a validator card to the beacon card, but
      the content of the vote (which block it voted for, whether it
      succeeded) is not observed (a validator keeps no copy of its own chain,
      and chainviz does not inspect the consensus client's internal state).
      The "how signing and verification work" sandbox demo (which lets you
      try EOA tx signature verification via ecrecover) also explains this
      distinction at the end, for contrast.
  layer: a-infra
  relatedTerms: [validator, beacon-api]

visualization-layers:
  name:
    ja: 可視化レイヤー（A層〜D層）
    en: Visualization layers (A–D)
  definition:
    ja: >-
      chainviz が画面を整理するための4つの視点。A層はインフラ（コンテナと
      プロセス）、B層はP2Pネットワーク（ノード間の通信）、C層はトランザク
      ション（チェーン上の出来事）、D層はノード内部（クライアント間の配管）
      を指す。ブロックチェーンは複数の抽象度が同時に動くシステムなので、
      どの高さから眺めるかを決めると理解しやすくなる。chainviz では既定で
      全レイヤーが同じキャンバスに同時に表示され、ツールバー下の「レイヤー」
      チップで1つを選ぶとその層に属する要素だけが通常表示のまま残り、他の
      要素は薄く表示される（レイヤーレンズ）。このA〜D層という区分は見せ方
      を整理するための便宜的な分類であり、chainviz の実装（コード構成）を
      そのまま表すものではない。
    en: >-
      The four viewpoints chainviz uses to organize the screen. Layer A is
      infrastructure (containers and processes), Layer B is the P2P network
      (communication between nodes), Layer C is transactions (on-chain
      events), and Layer D is node internals (the plumbing between clients).
      Because a blockchain runs several levels of abstraction at once,
      picking which height to view from makes it easier to follow. chainviz
      shows all layers on the same canvas by default; selecting one of the
      "Layers" chips below the toolbar keeps that layer's elements at full
      opacity while dimming the rest (the layer lens). This A–D grouping is
      an informal convention for organizing the view, not a reflection of
      chainviz's actual code structure.
  layer: a-infra
  relatedTerms: [container, el-client, cl-client]

rpc-endpoint:
  name:
    ja: RPCエンドポイント
    en: RPC endpoint
  definition:
    ja: >-
      ウォレットやアプリがチェーンとやり取りする窓口となる、1つのノードの
      API。実際の Ethereum でも「一番近いノードを探す」のではなく、あらかじめ
      決めた1つのエンドポイント（自分のノードや Infura / Alchemy などの
      事業者）に固定的に接続するのが普通。chainviz では全操作を観測（ロギング
      プロキシ）するため接続先をこの1本に固定しており、それが操作先エッジ
      として見える。P2P ネットワークの入口であるブートノードとは別の概念。
    en: >-
      The API of a single node that a wallet or app talks to. Real Ethereum
      wallets don't "find the nearest node" either — they connect to one
      fixed endpoint decided in advance (your own node, or a provider like
      Infura / Alchemy). chainviz additionally pins every operation's target
      to one node so its logging proxy can observe all calls; that pinned
      connection is what the operation-target edge shows. This is a separate
      concept from the bootnode, which is the entry point for P2P discovery.
  layer: a-infra
  relatedTerms: [workbench, bootnode]
