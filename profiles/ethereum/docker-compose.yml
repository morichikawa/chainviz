# chainviz Ethereum プロファイル — ノード環境テンプレート
#
# genesis を共有した PoS プライベートネット。実行層(reth)+ 合意層
# (lighthouse)を 2 ノード、Foundry ワークベンチを 1 つ、同じ Docker
# ネットワークに立ち上げる。
#
# 起動:   docker compose up
# 片付け: docker compose down -v   (-v で genesis / chain データも破棄)
#
# genesis は初回起動時に genesis サービスが現在時刻で生成し、共有ボリュームに
# 残す(詳細は README.md「genesis の扱い」)。以降の起動では既存の genesis を
# 再利用し、通常は再生成しない(冪等)。ただし全ノードが一定時間(既定 10 分)
# 以上停止していたことをハートビート(`heartbeat` ボリューム)から検知した
# 場合は、genesis を現在時刻で自動再生成する(README.md「長時間停止後の
# 再起動と weak subjectivity」、Issue #148)。まっさらな chain で始めたい
# ときは `docker compose down -v` でボリュームごと破棄する。

name: chainviz-ethereum

networks:
  chain:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  genesis: # 生成済み genesis / jwt / バリデーター鍵の共有先
  clpeer: # beacon ノード間で bootnode ENR を受け渡す
  elpeer: # reth ノード間で bootnode enode を受け渡す
  heartbeat: # 各ノードの生存報告置き場(Issue #148)。genesis サービスが
    # この中の最新更新時刻を見て、全ノード停止からの再起動かどうかを判定する
  reth1data:
  reth2data:
  beacon1data:
  beacon2data:
  vc1data:
  vc2data:

services:
  # --- genesis 生成(初回のみ実行して終了。以降は再利用し再生成しない)---
  genesis:
    image: ethpandaops/ethereum-genesis-generator:master
    entrypoint: ["/bin/sh", "/scripts/generate-genesis.sh"]
    environment:
      # ホスト側のシェルで指定した上書き値をコンテナへ伝える(Issue #148)。
      # composeのenvironment:に列挙しないとシェル前置き(VAR=... docker
      # compose up)だけではコンテナ内に渡らないため、既定値付きで明示する。
      GENESIS_LIVE_THRESHOLD_SEC: ${GENESIS_LIVE_THRESHOLD_SEC:-60}
      GENESIS_DOWNTIME_RESET_SEC: ${GENESIS_DOWNTIME_RESET_SEC:-600}
    volumes:
      - genesis:/data
      # 再生成時に down -v 相当のクリーンさにするため rw でマウントし、
      # bootnode の enode/ENR 受け渡しファイルも一緒に削除できるようにする
      # (Issue #148)。ノード側の :ro マウントは変更しない。
      - clpeer:/clpeer
      - elpeer:/elpeer
      - heartbeat:/heartbeat
      - ./values.env:/config/values.env:ro
      - ./scripts/generate-genesis.sh:/scripts/generate-genesis.sh:ro
    networks:
      - chain

  # --- ノード 1(reth + lighthouse beacon + validator)---
  reth1:
    image: ghcr.io/paradigmxyz/reth:latest
    depends_on:
      genesis:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/scripts/reth-node.sh"]
    environment:
      RETH_ROLE: boot
      RETH_P2P_IP: 172.28.1.1
      HEARTBEAT_NODE_NAME: reth1 # ハートビートファイル名(Issue #148)
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    labels:
      com.chainviz.p2p-role: "bootnode"
    volumes:
      - genesis:/genesis:ro
      - reth1data:/data
      - elpeer:/elpeer
      - heartbeat:/heartbeat # 生存報告の書き出し先(Issue #148)
      - ./scripts/reth-node.sh:/scripts/reth-node.sh:ro
    ports:
      - "8545:8545" # JSON-RPC(ホストから叩けるように公開)
    networks:
      chain:
        ipv4_address: 172.28.1.1

  beacon1:
    image: sigp/lighthouse:latest
    depends_on:
      genesis:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/scripts/lighthouse-bn.sh"]
    environment:
      BEACON_ROLE: boot
      ENR_ADDRESS: 172.28.2.1
      EXECUTION_ENDPOINT: http://reth1:8551
      HEARTBEAT_NODE_NAME: beacon1 # ハートビートファイル名(Issue #148)
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    labels:
      com.chainviz.p2p-role: "bootnode"
    volumes:
      - genesis:/genesis:ro
      - beacon1data:/data
      - clpeer:/clpeer
      - heartbeat:/heartbeat # 生存報告の書き出し先(Issue #148)
      - ./scripts/lighthouse-bn.sh:/scripts/lighthouse-bn.sh:ro
    ports:
      - "5052:5052" # Beacon HTTP API
    networks:
      chain:
        ipv4_address: 172.28.2.1

  validator1:
    image: sigp/lighthouse:latest
    depends_on:
      - beacon1
    entrypoint: ["/bin/sh", "/scripts/lighthouse-vc.sh"]
    environment:
      KEYS_DIR: /genesis/keys/node0
      BEACON_NODE: http://beacon1:5052
      FEE_RECIPIENT: "0x8943545177806ED17B9F23F0a21ee5948eCaa776"
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    volumes:
      - genesis:/genesis:ro
      - vc1data:/data
      - ./scripts/lighthouse-vc.sh:/scripts/lighthouse-vc.sh:ro
    networks:
      - chain

  # --- ノード 2(reth + lighthouse beacon + validator)---
  reth2:
    image: ghcr.io/paradigmxyz/reth:latest
    depends_on:
      genesis:
        condition: service_completed_successfully
      reth1:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/reth-node.sh"]
    environment:
      RETH_ROLE: peer
      RETH_P2P_IP: 172.28.1.2
      HEARTBEAT_NODE_NAME: reth2 # ハートビートファイル名(Issue #148)
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    volumes:
      - genesis:/genesis:ro
      - reth2data:/data
      - elpeer:/elpeer:ro
      - heartbeat:/heartbeat # 生存報告の書き出し先(Issue #148)
      - ./scripts/reth-node.sh:/scripts/reth-node.sh:ro
    networks:
      chain:
        ipv4_address: 172.28.1.2

  beacon2:
    image: sigp/lighthouse:latest
    depends_on:
      genesis:
        condition: service_completed_successfully
      beacon1:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/lighthouse-bn.sh"]
    environment:
      BEACON_ROLE: peer
      ENR_ADDRESS: 172.28.2.2
      EXECUTION_ENDPOINT: http://reth2:8551
      HEARTBEAT_NODE_NAME: beacon2 # ハートビートファイル名(Issue #148)
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    volumes:
      - genesis:/genesis:ro
      - beacon2data:/data
      - clpeer:/clpeer:ro
      - heartbeat:/heartbeat # 生存報告の書き出し先(Issue #148)
      - ./scripts/lighthouse-bn.sh:/scripts/lighthouse-bn.sh:ro
    networks:
      chain:
        ipv4_address: 172.28.2.2

  validator2:
    image: sigp/lighthouse:latest
    depends_on:
      - beacon2
    entrypoint: ["/bin/sh", "/scripts/lighthouse-vc.sh"]
    environment:
      KEYS_DIR: /genesis/keys/node1
      BEACON_NODE: http://beacon2:5052
      FEE_RECIPIENT: "0x8943545177806ED17B9F23F0a21ee5948eCaa776"
      HEARTBEAT_INTERVAL_SEC: ${HEARTBEAT_INTERVAL_SEC:-10}
      GENESIS_SUSPEND_DETECT_SEC: ${GENESIS_SUSPEND_DETECT_SEC:-600}
    volumes:
      - genesis:/genesis:ro
      - vc2data:/data
      - ./scripts/lighthouse-vc.sh:/scripts/lighthouse-vc.sh:ro
    networks:
      - chain

  # --- ワークベンチ(Foundry。ユーザー操作マシン)---
  # ノード群と同じネットワークに接続する。cast / forge の RPC 呼び出しは
  # reth1 を直接叩かず、ロギングプロキシ(collector が担う)経由に向ける。
  # プロキシは受け取った RPC をログに残しつつ reth1 へ転送する
  # (docs/CONCEPT.md「ユーザー操作マシン(ワークベンチ)の投影」の決定)。
  # Hardhat は未導入(docs/CONCEPT.md の決定に従い当面 Foundry のみ)。
  # 秘密鍵はチェーンと同じ mnemonic から導出する。mnemonic は genesis と
  # 同じ単一の出所(values.env の EL_AND_CL_MNEMONIC)を env_file で読み込む
  # ため、プリマイン済みアカウントの鍵と必ず一致する。プリマイン済みなので
  #   cast send --mnemonic "$EL_AND_CL_MNEMONIC" ...  で送金・デプロイできる。
  workbench:
    image: ghcr.io/foundry-rs/foundry:latest
    depends_on:
      - reth1
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    # genesis と同じ values.env を読み込み、mnemonic(EL_AND_CL_MNEMONIC)の
    # 出所を1箇所に一本化する。他の genesis 用変数も入るが cast / forge は
    # 参照しないため無害。
    env_file:
      - ./values.env
    # ロギングプロキシ(collector)はコンテナではなくホスト上のプロセスとして
    # ポート 4001 で待ち受ける(collector 本体の WebSocket は 4000 番)。
    # コンテナからホストへ到達するために host-gateway を host.docker.internal
    # へ割り当てる(Docker 20.10+ の機能。Linux の Docker Engine 上でも
    # host-gateway がホスト IP に解決されるため機能する。この環境で
    # `cast chain-id` の疎通を実測確認済み)。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # reth1 直接ではなくロギングプロキシ経由に向ける。プロキシが RPC 呼び出しを
      # ログに残してから reth1 の RPC へ転送する(ホスト上のプロキシからの
      # 具体的な到達アドレスは Issue #79 で確定)。
      ETH_RPC_URL: http://host.docker.internal:4001
    networks:
      - chain
